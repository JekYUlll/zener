services:
  # consul:
  #   image: "consul:1.15.4"
  #   ports:
  #     - "8500:8500"

  mysql:
    image: mysql:8.4
    container_name: dipole-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: zener
      MYSQL_USER: zener
      MYSQL_PASSWORD: donotpanic
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # redis:
